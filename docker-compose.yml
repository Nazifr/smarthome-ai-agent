services:

  # ─────────────────────────────────────────
  # MQTT BROKER (Mosquitto)
  # Tüm cihazlar ve agent buradan haberleşir
  # ─────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: smarthome-mqtt
    ports:
      - "1883:1883"       # plaintext (keep for Node-RED / legacy tools)
      - "8883:8883"       # TLS — all Python services use this
      - "9001:9001"       # WebSocket port (dashboard için)
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - iot-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # NODE-RED (Flow Engine)
  # Mesaj doğrulama, routing, dashboard
  # ─────────────────────────────────────────
  nodered:
    image: nodered/node-red:latest
    container_name: smarthome-nodered
    ports:
      - "1880:1880"       # Node-RED arayüzü: http://localhost:1880
    volumes:
      - ./nodered:/data
    environment:
      - TZ=Europe/Istanbul
    depends_on:
      - mosquitto
      - influxdb
    networks:
      - iot-net
      - app-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # INFLUXDB (Zaman Serisi Veritabanı)
  # Port 8086 intentionally NOT exposed to host — app-net only
  # ─────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: smarthome-influxdb
    # No "ports:" — only reachable inside app-net by backend/agent
    volumes:
      - ./influxdb:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=smarthome123
      - DOCKER_INFLUXDB_INIT_ORG=smarthome
      - DOCKER_INFLUXDB_INIT_BUCKET=sensor_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${DOCKER_INFLUXDB_INIT_ADMIN_TOKEN}
    networks:
      - app-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # AI AGENT (Python)
  # Karar veren, öğrenen ana bileşen
  # ─────────────────────────────────────────
  agent:
    build: ./agent
    container_name: smarthome-agent
    volumes:
      - ./agent:/app
      - ./mosquitto/config/certs:/etc/smarthome/certs:ro
    environment:
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=8883
      - MQTT_TLS=true
      - MQTT_CA_CERT=/etc/smarthome/certs/ca.crt
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - WEATHER_API_KEY=${WEATHER_API_KEY}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_REDIRECT_URI=http://127.0.0.1:8888/callback
      - ENABLE_SPOTIFY_ACTIONS=false
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${DOCKER_INFLUXDB_INIT_ADMIN_TOKEN}
      - INFLUX_ORG=smarthome
      - INFLUX_BUCKET=sensor_data
      - TZ=Europe/Istanbul
      - PYTHONUNBUFFERED=1
    depends_on:
      - mosquitto
      - influxdb
    networks:
      - iot-net
      - app-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # SENSOR SIMULATOR (Python)
  # Restricted MQTT user: publish sensor topics only
  # ─────────────────────────────────────────
  simulator:
    build: ./simulator
    container_name: smarthome-simulator
    volumes:
      - ./simulator:/app
      - ./mosquitto/config/certs:/etc/smarthome/certs:ro
    environment:
      - MQTT_USER=mqtt-sim
      - MQTT_PASSWORD=simpass2024
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=8883
      - MQTT_TLS=true
      - MQTT_CA_CERT=/etc/smarthome/certs/ca.crt
      - TZ=Europe/Istanbul
      - PUBLISH_INTERVAL=15
      - PYTHONUNBUFFERED=1
    depends_on:
      - mosquitto
    networks:
      - iot-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # FASTAPI BACKEND (REST API + MQTT bridge)
  # Dashboard verisi, aktüatör kontrolü
  # ─────────────────────────────────────────
  backend:
    build: ./backend
    container_name: smarthome-backend
    ports:
      - "8000:8000"
    volumes:
      - ./agent:/agent
      - ./mosquitto/config/certs:/etc/smarthome/certs:ro
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=8883
      - MQTT_TLS=true
      - MQTT_CA_CERT=/etc/smarthome/certs/ca.crt
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_CACHE_PATH=/agent/.spotify_cache
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${DOCKER_INFLUXDB_INIT_ADMIN_TOKEN}
      - INFLUX_ORG=smarthome
      - INFLUX_BUCKET=sensor_data
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - API_KEY=${API_KEY:-nh-sk-x7K2mN9pQ4rT}
      - TZ=Europe/Istanbul
    depends_on:
      - mosquitto
      - influxdb
    networks:
      - iot-net
      - app-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # REACT PWA FRONTEND
  # Web dashboard: http://localhost:5173
  # ─────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: smarthome-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
      - VITE_API_KEY=${API_KEY:-nh-sk-x7K2mN9pQ4rT}
    depends_on:
      - backend
    networks:
      - app-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # TELEGRAM BOT (Python)
  # Alert bildirimleri ve kullanıcı komutları
  # Restricted MQTT user: read alerts, write user sentiment only
  # ─────────────────────────────────────────
  telegram_bot:
    build: ./telegram_bot
    container_name: smarthome-telegram
    volumes:
      - ./telegram_bot:/app
      - ./mosquitto/config/certs:/etc/smarthome/certs:ro
    environment:
      - MQTT_USER=mqtt-tgram
      - MQTT_PASSWORD=tgrampass2024
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=8883
      - MQTT_TLS=true
      - MQTT_CA_CERT=/etc/smarthome/certs/ca.crt
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - ALLOWED_CHAT_IDS=${ALLOWED_CHAT_IDS:-}
      - TZ=Europe/Istanbul
      - PYTHONUNBUFFERED=1
    depends_on:
      - mosquitto
    networks:
      - iot-net
    restart: unless-stopped

# ─────────────────────────────────────────────────────────────────────────────
# Networks
# iot-net : MQTT broker + all IoT services (agent, simulator, telegram_bot)
# app-net : Backend, frontend, InfluxDB (+ agent + nodered which need both)
# Segmentation goal: simulator/telegram cannot reach InfluxDB directly;
#                    frontend cannot reach MQTT or InfluxDB directly.
# ─────────────────────────────────────────────────────────────────────────────
networks:
  iot-net:
    driver: bridge
  app-net:
    driver: bridge
