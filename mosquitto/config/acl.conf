# NeuroNest MQTT Access Control List
# Evaluated top-to-bottom per client; first match wins.
# Pattern: topic [read|write|readwrite] <topicfilter>

# ─── smarthome (master account) ─────────────────────────────────────────────
# Used by: AI agent, FastAPI backend
# Full read/write on everything
user smarthome
topic readwrite #

# ─── mqtt-sim (simulator) ───────────────────────────────────────────────────
# Used by: sensor simulator container
# May only PUBLISH to sensor topics — cannot subscribe or touch actuators
user mqtt-sim
topic write home/+/sensor/#

# ─── mqtt-tgram (telegram bot) ──────────────────────────────────────────────
# Used by: Telegram bot container
# Reads alert broadcasts, writes user sentiment — nothing else
user mqtt-tgram
topic read home/alerts
topic write home/user/#
